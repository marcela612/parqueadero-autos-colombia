<!DOCTYPE html>
<html>
<head>
    <title>Gestión de Celdas</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>Gestión de Celdas</h1>
</header>

<div class="container">

    <input type="number" id="numeroCelda" placeholder="Número de Celda">

    <div class="botones">
        <button onclick="registrarCelda()">Registrar Celda</button>
    </div>

    <div class="botones">
        <a href="index.html" class="btn-volver">← Volver</a>
    </div>

    <h2>Celdas</h2>

    <table>
        <thead>
            <tr>
                <th>Número</th>
                <th>Estado</th>
                <th>Acción</th>
            </tr>
        </thead>

        <tbody id="tablaCeldas"></tbody>
    </table>

</div>

<script src="js/celdas.js"></script>

</body>
</html>
